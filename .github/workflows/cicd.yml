name: CI/CD Pipeline

#Trigger pipeline on push to main branch
on:
  push:
    branches: [ "main" ]

jobs:
  # Step 1: Compile the application using Maven
  compile:
    name: Compile java project
    runs-on: ubuntu-latest
    steps:
    # Checkout the repository
    - uses: actions/checkout@v4
    # Set up JDK 17 and cache Maven dependencies
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    # compile the project using Maven
    - name: Compile with Maven
      run: mvn compile

  # Step 2: Security scan using trivy
  security-scan:
    name: Security scan with trivy
    runs-on: ubuntu-latest
    needs: compile
    steps:
    # Checkout the repository
    - uses: actions/checkout@v4

    # Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get install wget gnupg
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -y
        sudo apt-get install trivy -y
    # Run Trivy scan on filesystem
    - name: Trivy scan fs
      run: trivy fs --format table -o report-fs.txt .
    # Upload the Trivy report as an artifact
    - name: upload scan report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-scan-report
        path: report-fs.txt
